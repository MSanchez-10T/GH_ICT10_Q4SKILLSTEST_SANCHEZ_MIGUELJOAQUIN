<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NumPy Matplotlib</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>
    <link rel="stylesheet" href="style.css">
    <py-config>
        packages = ['numpy', 'matplotlib']
    </py-config>
    </head>

<body>
    <main class="tracker-section d-flex align-items-center">
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-12 col-md-10 col-lg-8 col-xl-6">
                    <div class="card tracker-card border-0 shadow-lg">
                        <div class="card-body p-4 p-md-5">
                            <div class="text-center mb-4">
                                <span class="badge tracker-badge rounded-pill px-3 py-2 mb-3">School Dashboard</span>
                                <h2 class="fw-bold mb-2">Attendance Tracker</h2>
                                <p class="text-secondary mb-0">Choose a month, enter the number of absences, and generate the chart.</p>
                            </div>

                            <form class="row g-3">
                                <div class="col-12">
                                    <label for="month" class="form-label fw-semibold">Select Month</label>
                                    <select id="month" class="form-select form-select-lg">
                                        <option value="Jan" selected>Jan</option>
                                        <option value="Feb">Feb</option>
                                        <option value="Mar">Mar</option>
                                        <option value="Apr">Apr</option>
                                        <option value="May">May</option>
                                        <option value="Aug">Aug</option>
                                        <option value="Sep">Sep</option>
                                        <option value="Oct">Oct</option>
                                        <option value="Nov">Nov</option>
                                        <option value="Dec">Dec</option>
                                    </select>
                                </div>

                                <div class="col-12">
                                    <label for="input1" class="form-label fw-semibold">Number of Absences</label>
                                    <input type="number" id="input1" class="form-control form-control-lg" placeholder="Enter the number of absences">
                                </div>

                                <div class="col-12 d-grid">
                                    <input type="button" py-click="graph" value="Show Graph" class="btn btn-lg tracker-btn">
                                </div>
                            </form>

                            <div id="output" class="output-panel mt-4"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <py-script src="main.py"></py-script> 
</body>

</html>
